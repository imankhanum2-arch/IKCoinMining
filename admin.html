<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IK Coin - Admin Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    padding: 20px;
    color: #fff;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 720px; }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 20px;
  }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .logo-circle {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800;
  }
  h1 { font-size: 19px; }
  .subtitle { color: #999; font-size: 12px; }

  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
  }
  input::placeholder { color: #999; }
  button {
    padding: 13px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-block { width: 100%; }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ddd;
  }
  .btn-small { padding: 8px 12px; font-size: 12px; }
  .msg { margin-top: 10px; font-size: 13px; min-height: 16px; }
  .msg.error { color: #ff6b6b; }
  .msg.success { color: #6bff9e; }
  .hidden { display: none; }

  .search-row { display: flex; gap: 8px; }
  .search-row input { margin-bottom: 0; }

  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    margin-bottom: 6px;
  }
  .profile-field { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 12px; }
  .profile-field .label { font-size: 11px; color: #999; margin-bottom: 3px; }
  .profile-field .value { font-size: 14px; font-weight: 600; word-break: break-all; }
  .profile-field.full { grid-column: 1 / -1; }
  .blue-check {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 50%;
    background: #1d9bf0; color: #fff; font-size: 9px; margin-left: 4px;
  }

  .section-title { font-size: 14px; font-weight: 700; margin: 20px 0 10px; color: #f7b733; }

  .tx-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .tx-left { flex: 1; min-width: 0; }
  .tx-tid { font-size: 12.5px; font-weight: 700; color: #eee; }
  .tx-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .tx-amount { font-size: 13px; font-weight: 700; color: #6bff9e; white-space: nowrap; }
  .tx-status {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    text-transform: uppercase; margin-left: 8px;
  }
  .tx-status.pending { background: rgba(247,183,51,0.15); color: #f7b733; }
  .tx-status.sent { background: rgba(107,255,158,0.15); color: #6bff9e; }

  .empty-note { font-size: 13px; color: #888; text-align: center; padding: 20px 0; }
  .logout-link { display: block; text-align: right; font-size: 12px; color: #888; cursor: pointer; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="wrap">

  <!-- LOGIN GATE -->
  <div class="card" id="loginCard">
    <div class="logo-row">
      <div class="logo-circle">IK</div>
      <div>
        <h1>Admin Panel</h1>
        <div class="subtitle">Authorized access only</div>
      </div>
    </div>
    <input type="email" id="adminEmail" placeholder="Admin email">
    <input type="password" id="adminPassword" placeholder="Password">
    <button class="btn-block" onclick="adminLogin(this)">Login</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- ADMIN CONSOLE -->
  <div id="adminConsole" class="hidden">
    <div class="logout-link" onclick="adminLogout()">Logout ⎋</div>

    <div class="card">
      <div class="section-title" style="margin-top:0;">🔍 Search User</div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search by username or TID..." onkeydown="if(event.key==='Enter') runSearch()">
        <button onclick="runSearch()">Search</button>
      </div>
      <div id="searchMsg" class="msg"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="section-title" style="margin-top:0;">👤 Profile</div>
      <div class="profile-grid" id="profileGrid"></div>

      <div class="section-title">💳 Transactions</div>
      <div id="txList"></div>

      <div class="section-title">➕ Send Coins to this User</div>
      <div class="search-row">
        <input type="number" id="sendAmountInput" placeholder="Amount (IK)" min="0" step="0.01">
        <button onclick="sendCoinsToUser()">Send</button>
      </div>
      <div id="sendCoinsMsg" class="msg"></div>
    </div>
  </div>

</div>

<script type="module">
import {
  auth, db, doc, getDoc, updateDoc, collection, addDoc, query, where, orderBy, getDocs,
  runTransaction, serverTimestamp, increment,
  signInWithEmailAndPassword, onAuthStateChanged, signOut,
  usernameDocRef, userDocRef, generateTID
} from './firebase-shared.js';

let currentProfileUid = '';

function setBtnLoading(btn, text) {
  if (!btn) return;
  if (btn.dataset.originalText === undefined) btn.dataset.originalText = btn.textContent;
  btn.textContent = text || 'Please wait...';
  btn.disabled = true;
}
function resetBtn(btn) {
  if (!btn) return;
  if (btn.dataset.originalText !== undefined) btn.textContent = btn.dataset.originalText;
  btn.disabled = false;
}

// ===== ADMIN AUTH =====
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById('loginCard').classList.remove('hidden');
    document.getElementById('adminConsole').classList.add('hidden');
    return;
  }
  // Only allow users listed in the "admins" collection to see the console
  const adminSnap = await getDoc(doc(db, 'admins', user.uid));
  if (!adminSnap.exists()) {
    document.getElementById('loginMsg').innerHTML =
      'Not authorized. Your exact UID is:<br><b style="user-select:all; word-break:break-all;">' + user.uid + '</b><br>Copy this exact text into the admins collection document ID.';
    document.getElementById('loginMsg').className = 'msg error';
    await signOut(auth);
    return;
  }
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('adminConsole').classList.remove('hidden');
});

window.adminLogin = async function(btn) {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const msgEl = document.getElementById('loginMsg');
  if (!email || !password) {
    msgEl.textContent = 'Enter email and password';
    msgEl.className = 'msg error';
    return;
  }
  setBtnLoading(btn, 'Logging in...');
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    console.error(e);
    msgEl.textContent = 'Login failed, check email/password';
    msgEl.className = 'msg error';
  } finally {
    resetBtn(btn);
  }
};

window.adminLogout = async function() {
  await signOut(auth);
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('searchInput').value = '';
};

// ===== SEARCH =====
window.runSearch = async function() {
  const raw = document.getElementById('searchInput').value.trim();
  const msgEl = document.getElementById('searchMsg');
  const resultCard = document.getElementById('resultCard');
  msgEl.textContent = '';
  msgEl.className = 'msg';
  resultCard.classList.add('hidden');

  if (!raw) {
    msgEl.textContent = 'Type a username or TID first';
    msgEl.className = 'msg error';
    return;
  }

  msgEl.textContent = 'Searching...';

  try {
    // Try as a username first
    const unameSnap = await getDoc(usernameDocRef(raw));
    if (unameSnap.exists()) {
      await loadProfile(unameSnap.data().uid);
      msgEl.textContent = '';
      return;
    }

    // Otherwise treat it as a TID and look up its transaction
    const txQuery = query(collection(db, 'transactions'), where('tid', '==', raw));
    const txSnap = await getDocs(txQuery);
    if (!txSnap.empty) {
      const uid = txSnap.docs[0].data().uid;
      await loadProfile(uid);
      msgEl.textContent = '';
      return;
    }

    msgEl.textContent = 'No user or TID found matching that';
    msgEl.className = 'msg error';
  } catch (e) {
    console.error(e);
    msgEl.textContent = 'Search error, please try again';
    msgEl.className = 'msg error';
  }
};

async function loadProfile(uid) {
  currentProfileUid = uid;
  const userSnap = await getDoc(userDocRef(uid));
  if (!userSnap.exists()) {
    document.getElementById('searchMsg').textContent = 'User profile not found';
    document.getElementById('searchMsg').className = 'msg error';
    return;
  }
  const data = userSnap.data();

  const grid = document.getElementById('profileGrid');
  grid.innerHTML = `
    <div class="profile-field"><div class="label">Username</div><div class="value">@${escapeHtml(data.username || '')}${data.blueTick ? '<span class="blue-check">✔</span>' : ''}</div></div>
    <div class="profile-field"><div class="label">Full Name</div><div class="value">${escapeHtml(data.fullName || '-')}</div></div>
    <div class="profile-field"><div class="label">Email</div><div class="value">${escapeHtml(data.email || '-')}</div></div>
    <div class="profile-field"><div class="label">Phone</div><div class="value">${escapeHtml(data.phone || '-')}</div></div>
    <div class="profile-field"><div class="label">Mining Coins</div><div class="value">${Number(data.collectedCoins || 0).toFixed(2)} IKT</div></div>
    <div class="profile-field"><div class="label">Wallet Balance</div><div class="value">${Number(data.walletBalance || 0).toFixed(2)} IK</div></div>
    <div class="profile-field"><div class="label">Referral Bonus (Locked)</div><div class="value">${Number(data.referralBonus || 0).toFixed(2)} IK</div></div>
    <div class="profile-field"><div class="label">Referrals</div><div class="value">${data.referrals || 0}</div></div>
    <div class="profile-field full"><div class="label">Wallet Address</div><div class="value">${escapeHtml(data.walletAddress || '-')}</div></div>
  `;

  document.getElementById('resultCard').classList.remove('hidden');
  await loadTransactions(uid);
}

async function loadTransactions(uid) {
  const txListEl = document.getElementById('txList');
  txListEl.innerHTML = '<div class="empty-note">Loading...</div>';

  try {
    const txQuery = query(
      collection(db, 'transactions'),
      where('uid', '==', uid),
      orderBy('timestamp', 'desc')
    );
    const snap = await getDocs(txQuery);

    if (snap.empty) {
      txListEl.innerHTML = '<div class="empty-note">No transactions yet</div>';
      return;
    }

    txListEl.innerHTML = '';
    snap.forEach(docSnap => {
      const tx = docSnap.data();
      const when = tx.timestamp && tx.timestamp.toDate ? tx.timestamp.toDate().toLocaleString() : '';
      const row = document.createElement('div');
      row.className = 'tx-item';
      row.innerHTML = `
        <div class="tx-left">
          <div class="tx-tid">${escapeHtml(tx.tid || docSnap.id)}</div>
          <div class="tx-meta">${when}</div>
        </div>
        <div class="tx-amount">+${Number(tx.amount || 0).toFixed(2)} IK</div>
        <span class="tx-status ${tx.status === 'sent' ? 'sent' : 'pending'}">${tx.status || 'pending'}</span>
        ${tx.status !== 'sent' ? `<button class="btn-small" data-id="${docSnap.id}">Mark Sent</button>` : ''}
      `;
      const markBtn = row.querySelector('button[data-id]');
      if (markBtn) {
        markBtn.onclick = () => markAsSent(docSnap.id, uid);
      }
      txListEl.appendChild(row);
    });
  } catch (e) {
    console.error(e);
    txListEl.innerHTML = '<div class="empty-note">Could not load transactions</div>';
  }
}

async function markAsSent(txId, uid) {
  try {
    await updateDoc(doc(db, 'transactions', txId), {
      status: 'sent',
      sentAt: serverTimestamp()
    });
    await loadTransactions(uid);
  } catch (e) {
    console.error(e);
    alert('Could not update — check admin permissions in Firestore rules');
  }
}

window.sendCoinsToUser = async function() {
  const amount = parseFloat(document.getElementById('sendAmountInput').value);
  const msgEl = document.getElementById('sendCoinsMsg');

  if (!currentProfileUid) return;
  if (!amount || amount <= 0) {
    msgEl.textContent = 'Enter a valid amount';
    msgEl.className = 'msg error';
    return;
  }

  msgEl.textContent = 'Sending...';
  msgEl.className = 'msg';

  try {
    const tid = generateTID();
    await runTransaction(db, async (tx) => {
      const userRef = userDocRef(currentProfileUid);
      tx.update(userRef, { walletBalance: increment(amount) });
    });

    await addDoc(collection(db, 'transactions'), {
      tid,
      type: 'admin_credit',
      status: 'completed',
      amount,
      toUid: currentProfileUid,
      timestamp: serverTimestamp()
    });

    msgEl.textContent = 'Sent ' + amount + ' IK (TID: ' + tid + ')';
    msgEl.className = 'msg success';
    document.getElementById('sendAmountInput').value = '';
    await loadProfile(currentProfileUid);
  } catch (e) {
    console.error(e);
    msgEl.textContent = 'Could not send — check admin permissions in Firestore rules';
    msgEl.className = 'msg error';
  }
};

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}
</script>

</body>
</html>
