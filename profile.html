<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IK Coin - Profile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center;
  }
  .user-name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 20px;
    font-weight: 700;
    margin-top: 8px;
    margin-bottom: 22px;
  }
  .blue-check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4dabf7, #1d9bf0);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    box-shadow: 0 0 0 2px rgba(29,155,240,0.25);
    flex-shrink: 0;
  }
  .detail-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .detail-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .detail-label {
    color: #f7b733;
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    text-align: left;
  }
  .detail-value {
    font-size: 14px;
    font-weight: 600;
    text-align: left;
    word-break: break-word;
  }
  .badge-yes { color: #6bff9e; }
  .badge-no { color: #999; }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    margin-bottom: 10px;
  }
  button:active { transform: scale(0.97); }
  .link-btn {
    background: none;
    color: #f7b733;
    font-size: 13px;
    font-weight: 500;
    padding: 8px;
    cursor: pointer;
    display: inline-block;
  }
  .msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
  .msg.error { color: #ff6b6b; }
  .hidden { display: none; }
  .loading-text { padding: 40px 0; color: #f7b733; font-weight: 700; }
</style>
</head>
<body>

<div class="card">

  <div id="loadingState" class="loading-text">Loading profile...</div>

  <div id="profileView" class="hidden">
    <div class="user-name-row">
      <span id="profileUsername"></span>
      <span id="profileBlueTick" class="blue-check hidden" title="Verified">✓</span>
    </div>

    <div class="detail-list">
      <div class="detail-row">
        <span class="detail-label">Full Name</span>
        <span class="detail-value" id="dFullName">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Email</span>
        <span class="detail-value" id="dEmail">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Phone</span>
        <span class="detail-value" id="dPhone">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Mined Coins</span>
        <span class="detail-value" id="dCoins">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Wallet Balance</span>
        <span class="detail-value" id="dBalance">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Referrals</span>
        <span class="detail-value" id="dReferrals">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Referral Bonus (locked)</span>
        <span class="detail-value" id="dReferralBonus">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Referred By</span>
        <span class="detail-value" id="dReferredBy">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Sessions Completed</span>
        <span class="detail-value" id="dSessionsCompleted">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Verified (Blue Tick)</span>
        <span class="detail-value" id="dBlueTick">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Joined On</span>
        <span class="detail-value" id="dCreatedAt">-</span>
      </div>
    </div>

    <button onclick="window.location.href='index.html'">Back to Dashboard</button>
    <div class="link-btn" onclick="doLogout()">Logout</div>
    <div id="profileMsg" class="msg"></div>
  </div>

</div>

<script type="module">
import { db, auth, doc, getDoc, onAuthStateChanged, signOut, userDocRef } from './firebase-shared.js';

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // Not logged in — send back to login screen.
    window.location.href = 'index.html';
    return;
  }
  await loadProfile(user.uid);
});

async function loadProfile(uid) {
  const msgEl = document.getElementById('profileMsg');
  try {
    const snap = await getDoc(userDocRef(uid));
    if (!snap.exists()) {
      msgEl.textContent = 'Could not find your profile data';
      msgEl.className = 'msg error';
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('profileView').classList.remove('hidden');
      return;
    }
    const data = snap.data();

    document.getElementById('profileUsername').textContent = data.username || '-';
    document.getElementById('profileBlueTick').classList.toggle('hidden', !data.blueTick);

    document.getElementById('dFullName').textContent = data.fullName || '-';
    document.getElementById('dEmail').textContent = data.email || '-';
    document.getElementById('dPhone').textContent = data.phone || 'Not provided';
    document.getElementById('dCoins').textContent = Number(data.collectedCoins || 0).toFixed(2) + ' IKT';
    document.getElementById('dBalance').textContent = Number(data.walletBalance || 0).toFixed(2) + ' IK Coin';
    document.getElementById('dReferrals').textContent = data.referrals || 0;
    document.getElementById('dReferralBonus').textContent = Number(data.referralBonus || 0).toFixed(2) + ' IK Coin';
    document.getElementById('dReferredBy').textContent = data.referredBy ? '@' + data.referredBy : 'None';
    document.getElementById('dSessionsCompleted').textContent = data.sessionsCompleted || 0;

    const blueTickEl = document.getElementById('dBlueTick');
    blueTickEl.textContent = data.blueTick ? 'Yes' : 'No';
    blueTickEl.className = 'detail-value ' + (data.blueTick ? 'badge-yes' : 'badge-no');

    if (data.createdAt) {
      const ms = data.createdAt.toMillis ? data.createdAt.toMillis() : new Date(data.createdAt).getTime();
      document.getElementById('dCreatedAt').textContent = new Date(ms).toLocaleDateString(undefined, {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    } else {
      document.getElementById('dCreatedAt').textContent = '-';
    }

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('profileView').classList.remove('hidden');
  } catch (e) {
    console.error(e);
    document.getElementById('loadingState').textContent = 'Failed to load profile, please refresh.';
  }
}

async function doLogout() {
  await signOut(auth);
  window.location.href = 'index.html';
}

window.doLogout = doLogout;
</script>

</body>
</html>
