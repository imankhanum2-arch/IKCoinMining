<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IK Coin - Download App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center;
  }
  .back-btn {
    position: absolute;
    top: 18px;
    left: 18px;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 18px;
    text-decoration: none;
  }
  .logo-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800;
    margin: 8px auto 16px;
    box-shadow: 0 0 30px rgba(252,74,26,0.5);
  }
  h1 { font-size: 21px; margin-bottom: 4px; }
  .subtitle { color: #bbb; font-size: 13px; margin-bottom: 22px; }

  /* ===== Platform cards ===== */
  .platform-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 18px;
    text-align: left;
    margin-bottom: 16px;
  }
  .platform-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .platform-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex: 0 0 42px;
  }
  .platform-icon.android { background: rgba(107,255,158,0.15); }
  .platform-icon.ios { background: rgba(255,255,255,0.12); }
  .platform-name { font-size: 15px; font-weight: 700; }
  .platform-desc { font-size: 11.5px; color: #999; margin-top: 2px; }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .status-tag.processing {
    background: rgba(247,183,51,0.12);
    color: #f7b733;
    border: 1px solid rgba(247,183,51,0.4);
  }
  .status-tag.ready {
    background: rgba(107,255,158,0.12);
    color: #6bff9e;
    border: 1px solid rgba(107,255,158,0.4);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse2 1.6s infinite;
  }
  @keyframes pulse2 {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    70%  { box-shadow: 0 0 0 8px transparent; opacity: 0.5; }
    100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
  }

  .platform-note {
    font-size: 12px;
    color: #bbb;
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .platform-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .platform-btn:active { transform: scale(0.97); }
  .platform-btn.enabled.android {
    background: linear-gradient(135deg, #6bff9e, #1d9bf0);
    color: #08331d;
  }
  .platform-btn.enabled.ios {
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    color: #fff;
  }
  .platform-btn.disabled {
    background: rgba(255,255,255,0.07);
    color: #888;
    cursor: not-allowed;
    border: 1px dashed rgba(255,255,255,0.2);
  }

  .btn-link {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ddd;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, opacity 0.15s;
    margin-top: 6px;
  }
  .btn-link:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="back-btn" aria-label="Back to dashboard">←</a>

  <div class="logo-circle">IK</div>
  <h1>Download IK Coin App</h1>
  <p class="subtitle">Choose your device to get the app</p>

  <!-- ================= ANDROID ================= -->
  <div class="platform-card">
    <div class="platform-head">
      <div class="platform-icon android">🤖</div>
      <div>
        <div class="platform-name">Android</div>
        <div class="platform-desc">APK file, install directly on your phone</div>
      </div>
    </div>
    <div id="androidStatus"></div>
    <div id="androidNote" class="platform-note"></div>
    <div id="androidBtnWrap"></div>
  </div>

  <!-- ================= iOS ================= -->
  <div class="platform-card">
    <div class="platform-head">
      <div class="platform-icon ios">🍏</div>
      <div>
        <div class="platform-name">iOS (iPhone / iPad)</div>
        <div class="platform-desc">Available via App Store</div>
      </div>
    </div>
    <div id="iosStatus"></div>
    <div id="iosNote" class="platform-note"></div>
    <div id="iosBtnWrap"></div>
  </div>

  <a href="index.html" class="btn-link">Back to Dashboard</a>
</div>

<script>
  // ===================================================================
  // SET YOUR REAL LINKS HERE WHEN READY.
  // Leave as '' (empty) to automatically show "Under Processing" status.
  // As soon as you paste a real URL here, that platform's button
  // automatically switches to a live, working "Download Now" button.
  // ===================================================================
  const ANDROID_APK_URL = '';   // e.g. 'https://yourdomain.com/downloads/IKCoin.apk'
  const IOS_APP_URL = '';       // e.g. 'https://apps.apple.com/app/idXXXXXXXXX'

  function renderPlatform(prefix, url, icon, label, downloadAttr) {
    const statusEl = document.getElementById(prefix + 'Status');
    const noteEl = document.getElementById(prefix + 'Note');
    const btnWrapEl = document.getElementById(prefix + 'BtnWrap');

    if (url && url.trim()) {
      statusEl.innerHTML = '<span class="status-tag ready"><span class="status-dot"></span>Available Now</span>';
      noteEl.textContent = 'The app is ready — tap below to download it.';
      btnWrapEl.innerHTML =
        '<a href="' + url + '" ' + (downloadAttr ? 'download' : 'target="_blank" rel="noopener"') +
        ' class="platform-btn enabled ' + prefix + '">' + icon + ' Download for ' + label + '</a>';
    } else {
      statusEl.innerHTML = '<span class="status-tag processing"><span class="status-dot"></span>Under Processing</span>';
      noteEl.textContent = 'The ' + label + ' app is being prepared. It will be announced here very soon — stay tuned!';
      btnWrapEl.innerHTML =
        '<button class="platform-btn disabled" disabled>' + icon + ' Coming Soon</button>';
    }
  }

  renderPlatform('android', ANDROID_APK_URL, '🤖', 'Android', true);
  renderPlatform('ios', IOS_APP_URL, '🍏', 'iOS', false);
</script>

</body>
</html>
