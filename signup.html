<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IK Coin - Create Account</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center;
  }
  .logo-circle {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800;
    margin: 0 auto 16px;
    box-shadow: 0 0 30px rgba(252,74,26,0.5);
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #bbb; font-size: 13px; margin-bottom: 24px; }
  input, select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
  }
  select option { background: #24243e; color: #fff; }
  input::placeholder { color: #999; }

  /* OTP field: big, centered, letter-spaced digits */
  #otpInput {
    text-align: center;
    letter-spacing: 10px;
    font-size: 22px;
    font-weight: 700;
  }

  .phone-row { display: flex; gap: 8px; position: relative; }
  .phone-row input { flex: 1; margin-bottom: 0; }

  .country-dropdown { position: relative; flex: 0 0 78px; }
  .country-btn {
    width: 100%;
    padding: 14px 8px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }
  .country-panel {
    position: absolute;
    top: 54px;
    left: 0;
    width: 260px;
    max-height: 280px;
    background: #24243e;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 50;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .country-panel.hidden { display: none; }
  .country-search {
    margin: 8px;
    width: calc(100% - 16px);
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .country-list {
    overflow-y: auto;
    max-height: 220px;
    padding-bottom: 6px;
  }
  .country-item {
    padding: 10px 14px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
  }
  .country-item:hover { background: rgba(255,255,255,0.08); }
  .country-item .code { color: #f7b733; font-weight: 600; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #f7b733, #fc4a1a);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  button:active { transform: scale(0.97); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: linear-gradient(135deg, #a98a54, #a8543a);
  }
  .link-btn {
    background: none;
    color: #f7b733;
    font-size: 13px;
    font-weight: 500;
    padding: 8px;
    margin-top: 4px;
  }
  .msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
  .msg.error { color: #ff6b6b; }
  .msg.success { color: #6bff9e; }
  .hidden { display: none; }
  .field-hint { font-size: 11px; color: #888; margin: -8px 0 12px; text-align: left; }
  .otp-counter { font-size: 12px; color: #888; margin: -8px 0 14px; text-align: right; }
  .back-link { display: block; margin-top: 16px; font-size: 13px; color: #bbb; cursor: pointer; }
  .back-link:hover { color: #f7b733; }
</style>
</head>
<body>

<div class="card">

  <div class="logo-circle">IK</div>
  <h1>Create New Account</h1>
  <p class="subtitle">Join IK Coin Mining</p>

  <!-- STEP A - Email OTP -->
  <div id="emailStep">
    <input type="email" id="emailInput" placeholder="Email address">
    <button id="sendOtpBtn" onclick="requestOtp(this)">Send OTP</button>
    <div id="emailMsg" class="msg"></div>
    <div class="back-link" onclick="window.location.href='index.html'">Already have an account? Login</div>
  </div>

  <!-- STEP B - Verify OTP -->
  <div id="otpStep" class="hidden">
    <input
      type="text"
      id="otpInput"
      placeholder="000000"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="6"
      autocomplete="one-time-code"
      oninput="onOtpInput()">
    <div class="otp-counter" id="otpCounter">0 / 6 digits</div>
    <button id="verifyOtpBtn" onclick="verifyOtp(this)" disabled>Verify now</button>
    <div id="otpMsg" class="msg"></div>
    <div class="back-link" onclick="goBackToEmailStep()">← Change email</div>
    <div class="back-link" onclick="window.location.href='index.html'">Already have an account? Login</div>
  </div>

  <!-- STEP C - Referral code (optional) -->
  <div id="referralStep" class="hidden">
    <input type="text" id="referralCodeInput" placeholder="Referral code (optional)" oninput="this.value = this.value.toLowerCase(); onReferralInput()">
    <div id="referralMsg" class="msg"></div>
    <button onclick="continueFromReferral()">Continue</button>
    <button class="link-btn" onclick="skipReferral()">Skip</button>
  </div>

  <!-- STEP D - Final details, phone optional -->
  <div id="credentialsStep" class="hidden">
    <input type="text" id="newFullName" placeholder="Full Name">

    <div class="phone-row">
      <div class="country-dropdown" id="countryDropdown">
        <button type="button" class="country-btn" id="countryBtn" onclick="toggleCountryList()">+1</button>
        <div class="country-panel hidden" id="countryPanel">
          <input type="text" class="country-search" id="countrySearch" placeholder="Search..." oninput="renderCountryList(this.value)">
          <div class="country-list" id="countryList"></div>
        </div>
      </div>
      <input type="tel" id="phoneInput" placeholder="Phone number (optional)" oninput="onPhoneInput()">
    </div>
    <div class="field-hint" id="phoneHint">Phone number is optional, email is already verified.</div>

    <input type="text" id="newUsername" placeholder="Username" oninput="this.value = this.value.toLowerCase()">
    <input type="password" id="newPassword" placeholder="Password (Minimum 6 characters)">
    <button onclick="setCredentials(this)">Create Account</button>
    <div id="credMsg" class="msg"></div>
  </div>

</div>

// Only bounce back to the dashboard if this looks like someone who

onAuthStateChanged(auth, (user) => {
  const hasRefParam = new URLSearchParams(window.location.search).has('ref');
  if (user && hasRefParam) {
    window.location.replace('index.html');

});

let selectedDialCode = '+1'; // default US
let selectedMaxDigits = 10;  // default US

function renderCountryList(filter) {
  const listEl = document.getElementById('countryList');
  listEl.innerHTML = '';
  const f = (filter || '').toLowerCase();
  COUNTRIES
    .filter(c => c[0].toLowerCase().includes(f) || c[2].includes(f))
    .forEach(c => {
      const item = document.createElement('div');
      item.className = 'country-item';
      item.innerHTML = '<span>' + c[0] + '</span><span class="code">' + c[2] + '</span>';
      item.onclick = () => selectCountry(c[2], c[3]);
      listEl.appendChild(item);
    });
}

function selectCountry(dialCode, maxDigits) {
  selectedDialCode = dialCode;
  selectedMaxDigits = maxDigits || 12;
  document.getElementById('countryBtn').textContent = dialCode;
  document.getElementById('countryPanel').classList.add('hidden');
  document.getElementById('countrySearch').value = '';
  renderCountryList('');
  // Re-apply the new country's digit limit to whatever's already typed
  onPhoneInput();
}

// Digits only, no leading 0 (not needed once the country code is already
// prefixed), capped at the selected country's standard number length.
function onPhoneInput() {
  const phoneEl = document.getElementById('phoneInput');
  const hintEl = document.getElementById('phoneHint');
  if (!phoneEl) return;

  let digits = phoneEl.value.replace(/\D/g, '');
  digits = digits.replace(/^0+/, '');
  digits = digits.slice(0, selectedMaxDigits);
  if (phoneEl.value !== digits) {
    phoneEl.value = digits;
  }

  if (hintEl) {
    hintEl.textContent = digits.length
      ? digits.length + ' / ' + selectedMaxDigits + ' digits (no leading 0 needed after ' + selectedDialCode + ')'
      : 'Optional — ' + selectedMaxDigits + ' digits after ' + selectedDialCode + ', no leading 0';
  }
}

function toggleCountryList() {
  const panel = document.getElementById('countryPanel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) {
    document.getElementById('countrySearch').focus();
  }
}

document.addEventListener('click', function(e) {
  const dropdown = document.getElementById('countryDropdown');
  if (dropdown && !dropdown.contains(e.target)) {
    document.getElementById('countryPanel').classList.add('hidden');
  }
});

let pendingEmail = '';
let referredByCode = '';

window.onload = function() {
  renderCountryList('');

  // If arrived via a referral link (?ref=USERNAME), capture it
  const urlParams = new URLSearchParams(window.location.search);
  const ref = urlParams.get('ref');
  if (ref) {
    referredByCode = ref.toLowerCase();
  }
};

// ===== BUTTON LOADING STATE HELPERS =====
function setBtnLoading(btn, loadingText) {
  if (!btn) return;
  if (btn.dataset.originalText === undefined) {
    btn.dataset.originalText = btn.textContent;
  }
  btn.textContent = loadingText || 'Please wait...';
  btn.disabled = true;
}

function resetBtn(btn) {
  if (!btn) return;
  if (btn.dataset.originalText !== undefined) {
    btn.textContent = btn.dataset.originalText;
  }
  btn.disabled = false;
}

async function requestOtp(btn) {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  const msgEl = document.getElementById('emailMsg');

  if (!/^\S+@\S+\.\S+$/.test(email)) {
    msgEl.textContent = 'Please enter correct email';
    msgEl.className = 'msg error';
    return;
  }

  msgEl.textContent = 'Sending OTP...';
  msgEl.className = 'msg';
  setBtnLoading(btn, 'Sending...');

  try {
    // Email already fully registered? block re-signup.
    const existing = await getDoc(doc(db, 'signupOtps', email));
    if (existing.exists() && existing.data().registered) {
      msgEl.textContent = 'Email already registered, please login';
      msgEl.className = 'msg error';
      resetBtn(btn);
      return;
    }

    const otp = generateOtp();
    await setDoc(doc(db, 'signupOtps', email), {
      otp, verified: false, registered: false, createdAt: serverTimestamp()
    });

    pendingEmail = email;
    document.getElementById('emailStep').classList.add('hidden');
    document.getElementById('otpStep').classList.remove('hidden');
    document.getElementById('otpInput').value = '';
    onOtpInput();
    document.getElementById('otpInput').focus();
    resetBtn(btn);

    const otpMsg = document.getElementById('otpMsg');
    otpMsg.textContent = 'Sending email...';
    otpMsg.className = 'msg';

    // Don't make the user wait on Apps Script (it's slow, 3-6s) before they
    // can even see the OTP screen — send it in the background instead.
    sendOtpEmail(email, otp).then((relayResult) => {
      if (relayResult.success) {
        otpMsg.textContent = 'OTP sent to ' + email;
        otpMsg.className = 'msg success';
      } else {
        otpMsg.textContent = 'Could not send email, tap Resend to try again';
        otpMsg.className = 'msg error';
      }
    });
  } catch (e) {
    console.error(e);
    msgEl.textContent = 'Connection error, please try again';
    msgEl.className = 'msg error';
    resetBtn(btn);
  }
}

// ===== OTP FIELD: digits only, exactly 6 digits required to enable the button =====
function onOtpInput() {
  const otpEl = document.getElementById('otpInput');
  const counterEl = document.getElementById('otpCounter');
  const verifyBtn = document.getElementById('verifyOtpBtn');

  // Strip anything that isn't a digit and cap at 6 characters
  const digitsOnly = otpEl.value.replace(/\D/g, '').slice(0, 6);
  if (otpEl.value !== digitsOnly) {
    otpEl.value = digitsOnly;
  }

  counterEl.textContent = digitsOnly.length + ' / 6 digits';

  // Enable the button ONLY when the OTP is exactly 6 digits (min and max)
  verifyBtn.disabled = digitsOnly.length !== 6;
}

async function verifyOtp(btn) {
  const otp = document.getElementById('otpInput').value.trim();
  const msgEl = document.getElementById('otpMsg');
  if (otp.length !== 6) {
    msgEl.textContent = 'Enter your six digit OTP';
    msgEl.className = 'msg error';
    return;
  }
  setBtnLoading(btn, 'Verifying...');
  try {
    const snap = await getDoc(doc(db, 'signupOtps', pendingEmail));
    if (!snap.exists() || String(snap.data().otp) !== String(otp)) {
      msgEl.textContent = 'Wrong OTP';
      msgEl.className = 'msg error';
      resetBtn(btn);
      return;
    }

    await setDoc(doc(db, 'signupOtps', pendingEmail), { verified: true }, { merge: true });

    document.getElementById('otpStep').classList.add('hidden');
    document.getElementById('referralStep').classList.remove('hidden');

    // If the user arrived via a referral link, pre-fill and validate it
    if (referredByCode) {
      document.getElementById('referralCodeInput').value = referredByCode;
      onReferralInput();
    }
  } catch (e) {
    console.error(e);
    msgEl.textContent = 'Connection error, please try again';
    msgEl.className = 'msg error';
  } finally {
    resetBtn(btn);
  }
}

let referralDebounceTimer = null;
let referralValidated = false;

function onReferralInput() {
  const code = document.getElementById('referralCodeInput').value.trim();
  const msgEl = document.getElementById('referralMsg');
  referralValidated = false;

  clearTimeout(referralDebounceTimer);

  if (!code) {
    msgEl.textContent = '';
    msgEl.className = 'msg';
    return;
  }

  msgEl.textContent = 'Checking...';
  msgEl.className = 'msg';

  referralDebounceTimer = setTimeout(async () => {
    try {
      // Note: at this point in signup the visitor is NOT authenticated yet
      // (account creation happens later, in Step D). Firestore rules only
      // allow reading /users/{uid} when logged in, so we can't fetch the
      // referrer's user doc here. The /usernames/{username} doc is public
      // read, so we look up the referrer's name from there instead.
      const unameSnap = await getDoc(usernameDocRef(code));
      if (!unameSnap.exists() || !unameSnap.data().fullName) {
        msgEl.textContent = 'No Referral Found';
        msgEl.className = 'msg error';
        referralValidated = false;
        return;
      }
      msgEl.textContent = 'Referred by: ' + unameSnap.data().fullName;
      msgEl.className = 'msg success';
      referralValidated = true;
    } catch (e) {
      console.error(e);
      msgEl.textContent = 'Connection error';
      msgEl.className = 'msg error';
    }
  }, 500);
}

function continueFromReferral() {
  const code = document.getElementById('referralCodeInput').value.trim();
  const msgEl = document.getElementById('referralMsg');

  if (code && !referralValidated) {
    msgEl.textContent = 'Referral code is invalid, fix it or click Skip';
    msgEl.className = 'msg error';
    return;
  }

  referredByCode = code || '';
  document.getElementById('referralStep').classList.add('hidden');
  document.getElementById('credentialsStep').classList.remove('hidden');
}

function skipReferral() {
  referredByCode = '';
  document.getElementById('referralStep').classList.add('hidden');
  document.getElementById('credentialsStep').classList.remove('hidden');
}

async function setCredentials(btn) {
  const fullName = document.getElementById('newFullName').value.trim();
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const msgEl = document.getElementById('credMsg');

  let localNumber = document.getElementById('phoneInput').value.trim();
  let fullPhone = '';
  if (localNumber) {
    localNumber = localNumber.replace(/^0+/, '');
    fullPhone = selectedDialCode + localNumber;
  }

  if (!fullName) {
    msgEl.textContent = 'Please enter your full name';
    msgEl.className = 'msg error';
    return;
  }
  if (username.length < 3) {
    msgEl.textContent = 'Username must be at least 3 characters';
    msgEl.className = 'msg error';
    return;
  }
  if (password.length < 6) {
    msgEl.textContent = 'Password must be at least 6 characters';
    msgEl.className = 'msg error';
    return;
  }

  setBtnLoading(btn, 'Creating account...');
  const usernameLower = username.toLowerCase();

  // Declared here (not inside try) so the catch block below can check
  // whether an Auth account was already created and roll it back if a
  // later step failed.
  let cred = null;

  try {
    // Run the 3 independent lookups together instead of one-by-one — each
    // network round trip was adding to the wait before account creation.
    const [otpSnap, existingUsername, refUnameSnap] = await Promise.all([
      getDoc(doc(db, 'signupOtps', pendingEmail)),
      getDoc(usernameDocRef(usernameLower)),
      referredByCode ? getDoc(usernameDocRef(referredByCode)) : Promise.resolve(null)
    ]);

    // 1) Email must be OTP-verified
    if (!otpSnap.exists() || otpSnap.data().verified !== true) {
      msgEl.textContent = 'Email is not verified yet, please verify OTP first';
      msgEl.className = 'msg error';
      resetBtn(btn);
      return;
    }

    // 2) Username must be free
    if (existingUsername.exists()) {
      msgEl.textContent = 'Username already exist please choose another one';
      msgEl.className = 'msg error';
      resetBtn(btn);
      return;
    }

    // 3) Resolve referrer (if any)
    let referrerUid = '';
    if (refUnameSnap && refUnameSnap.exists()) referrerUid = refUnameSnap.data().uid;

    // 4) Create the Auth account first, and WAIT for it to finish before
    // touching Firestore. The stats counter transaction below requires an
    // authenticated request (per security rules) — running it in parallel
    // with account creation was a race condition: if the Auth token hadn't
    // finished propagating yet when the transaction hit Firestore, it was
    // rejected with permission-denied, which failed the whole account
    // creation AFTER the Auth user already existed (orphaned account).
    // Sequential here is required for correctness, not just a nice-to-have.
    cred = await createUserWithEmailAndPassword(auth, pendingEmail, password);
    const uid = cred.user.uid;

    // From here on, the Auth account exists. ANY failure below must roll it
    // back (delete the Auth user) — otherwise the email is stuck as "in use"
    // with no profile data, and the user is left silently signed-in as a
    // profile-less account (which also makes referral links bounce them to
    // the login screen instead of showing signup).
    let blueTick = false;
    await runTransaction(db, async (tx) => {
      const statsSnap = await tx.get(statsDocRef());
      const totalUsers = statsSnap.exists() ? (statsSnap.data().totalUsers || 0) : 0;
      blueTick = totalUsers < BLUE_TICK_LIMIT;
      tx.set(statsDocRef(), { totalUsers: totalUsers + 1 }, { merge: true });
    });
    const walletAddress = generateWalletAddress();

    // 6) User profile + username index + referrer credit + OTP cleanup —
    // none of these depend on each other, so fire them together.
    const writes = [
      setDoc(userDocRef(uid), {
        username: usernameLower,
        fullName,
        email: pendingEmail,
        phone: fullPhone || '',
        walletAddress,
        collectedCoins: 0,
        walletBalance: 0,
        referralBonus: 0,
        sessionsCompleted: 0,
        sessionsMissed: 0,
        referrals: 0,
        referredBy: referrerUid ? referredByCode : '',
        blueTick,
        lastMineTime: null,
        createdAt: serverTimestamp()
      }),
      setDoc(usernameDocRef(usernameLower), { uid, email: pendingEmail, fullName }),
      setDoc(doc(db, 'signupOtps', pendingEmail), { registered: true }, { merge: true })
    ];
    if (referrerUid) {
      writes.push(setDoc(userDocRef(referrerUid), {
        referrals: increment(1),
        referralBonus: increment(REFERRAL_BONUS)
      }, { merge: true }));
      writes.push(addDoc(collection(db, 'transactions'), {
        tid: generateTID(),
        type: 'referral_bonus',
        status: 'locked',
        amount: REFERRAL_BONUS,
        toUid: referrerUid,
        toUsername: referredByCode,
        fromUsername: usernameLower,
        timestamp: serverTimestamp()
      }));
    }

    await Promise.all(writes);

    msgEl.textContent = 'Account created! Redirecting...';
    msgEl.className = 'msg success';
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  } catch (e) {
    console.error(e);

    // If an Auth account was created (cred is set) but we ended up here,
    // something after account creation failed — the stats transaction or
    // one of the profile writes. That leaves an orphaned Auth account: no
    // profile data, but the email is now "in use", so every retry would
    // fail with auth/email-already-in-use, and the browser is left silently
    // signed-in as a profile-less user (which also makes referral links
    // bounce to the login screen instead of showing signup). Roll it back
    // so the user gets a clean retry.
    if (cred && cred.user) {
      try {
        await cred.user.delete();
        console.error('Rolled back orphaned Auth account after failure:', e);
      } catch (rollbackErr) {
        console.error('Rollback delete failed:', rollbackErr);
      }
    }

    let friendly = 'Something went wrong, please try again';
    if (e.code === 'auth/email-already-in-use') friendly = 'Email already registered please click on login';
    if (e.code === 'auth/weak-password') friendly = 'Password must be at least 6 characters';
    if (e.code === 'permission-denied') friendly = 'Could not save your details, please try again';
    msgEl.textContent = friendly;
    msgEl.className = 'msg error';
  } finally {
    resetBtn(btn);
  }
}

window.goBackToEmailStep = function() {
  document.getElementById('otpStep').classList.add('hidden');
  document.getElementById('emailStep').classList.remove('hidden');
  document.getElementById('otpInput').value = '';
  onOtpInput();
  document.getElementById('otpMsg').textContent = '';
  document.getElementById('emailMsg').textContent = '';
  pendingEmail = '';
};

window.requestOtp = requestOtp;
window.verifyOtp = verifyOtp;
window.onOtpInput = onOtpInput;
window.onPhoneInput = onPhoneInput;
window.onReferralInput = onReferralInput;
window.continueFromReferral = continueFromReferral;
window.skipReferral = skipReferral;
window.setCredentials = setCredentials;
window.renderCountryList = renderCountryList;
window.toggleCountryList = toggleCountryList;
</script>
